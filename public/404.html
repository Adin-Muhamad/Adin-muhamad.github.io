<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirect to home</title>
    <script type="text/javascript">
      // Redirect all 404s to index.html with the original path preserved
      var path = window.location.pathname.replace('/adin-portofolio/', '');
      window.location.href = '/adin-portofolio/?redirect=' + encodeURIComponent(path);
    </script>
  </head>
  <body>
  </body>
</html>
