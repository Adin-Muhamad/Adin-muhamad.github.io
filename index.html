<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adin Muhamad</title>

    <link rel="stylesheet" href="output.css">

</head>

<body>
    <div class="absolute w-full h-screen bg-gradient-to-br from-purple-700 via-blue-600 to-green-500 overflow-hidden">
        <div class="absolute inset-0">
            <div class="bg-gradient-r from-purple-500 via-transparent to-blue-400 opacity-50 blur-[120px] w-[400px] h-[400px] rounded-full top-1/4 left-1/4 absolute"></div>
            <div class="bg-gradient-l from-green-400 via-transparent to-teal-600 opacity-50 blur-[120px] w-[500px] h-[500px] rounded-full top-3/4 left-1/4 absolute"></div>
            <div class="bg-gradient-tr from-blue-500 via-transparant to-indigo-400 opacity-50 blur-[160px] w-[600px] h-[600px] rounded-full bottom-1/4 left-1/2 absolute"></div>
        </div>
    </div>

<div class="relative w-full h-full flex items-center justify-center">
    <div class="relative bg-gray-800/40 backdrop-blur-md rounded-xl shadow-lg p-8 max-w-lg w-4/5 md:w-1/2 lg:w-1/3">
      <!-- Frost Effect -->
      <div class="absolute inset-0 bg-gradient-to-br from-gray-800 via-gray-900 to-gray-950 opacity-30 rounded-xl"></div>
      <div class="relative z-10">
        <!-- Title -->
        <h2 class="text-2xl font-bold text-white mb-4">Frosted UI Card</h2>
        <!-- Content -->
        <p class="text-gray-300 mb-6">
          This is a modern Frost UI design using Tailwind CSS. The frosted glass effect is achieved using
          <code>backdrop-blur-md</code> and a semi-transparent background.
        </p>
        <!-- Button -->
        <button class="w-full py-2 px-4 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-500 transition">
          Learn More
        </button>
      </div>
    </div>
  </div>
</body>
</html>
