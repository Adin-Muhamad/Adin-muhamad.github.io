# Workflow khusus untuk melakukan build Vite dan deploy ke GitHub Pages
name: Deploy Vite project to GitHub Pages

on:
  push:
    branches: ["master"] # Jalankan otomatis setiap push ke branch master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Menggunakan Node.js versi 20 yang stabil
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Menginstal semua library/package proyekmu secara bersih

      - name: Build Project
        run: npm run build # Mengubah React/Vite menjadi file statis di folder dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist' # Diubah ke 'dist' agar mengunggah hasil build Vite, bukan file mentah!

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5